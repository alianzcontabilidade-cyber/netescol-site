<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <!-- NetEscol Text (dark version for light backgrounds) -->
  <text x="0" y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-1">
    <tspan fill="#1e3a5f">Net</tspan><tspan fill="#1e3a5f">Esc</tspan><tspan fill="#22c55e">o</tspan><tspan fill="#1e3a5f">l</tspan>
  </text>

  <!-- Chart icon integrated into the "o" -->
  <g transform="translate(295, 18)">
    <!-- Chart bars -->
    <rect x="0" y="32" width="8" height="18" rx="2" fill="#22c55e" opacity="0.6"/>
    <rect x="12" y="24" width="8" height="26" rx="2" fill="#22c55e" opacity="0.8"/>
    <rect x="24" y="14" width="8" height="36" rx="2" fill="#4ade80"/>
    <!-- Arrow up -->
    <path d="M4 30 L28 8" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 6 L30 8 L26 16" fill="#22c55e"/>
