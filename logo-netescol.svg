  </g>

  <!-- Subtitle -->
  <text x="2" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#94a3b8" letter-spacing="2">
    Gestao Escolar Inteligente
  </text>
